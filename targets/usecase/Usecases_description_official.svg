<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" contentStyleType="text/css" data-diagram-type="CLASS" height="197px" preserveAspectRatio="none" style="width:354px;height:197px;background:#FFFFFF;" version="1.1" viewBox="0 0 354 197" width="354px" zoomAndPan="magnify"><?plantuml 1.2026.3beta5?><defs/><g><!--entity UC1--><g class="entity" data-qualified-name="UC1" data-source-line="1" id="ent0002"><ellipse cx="174.1957" cy="95.7973" fill="#F1F1F1" rx="167.1957" ry="88.7973" style="stroke:#181818;stroke-width:0.5;"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="84.8203" x="131.7856" y="38.7535">You can use</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="256.5938" x="45.8989" y="55.0503">several lines to define your usecase.</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="201.3115" x="73.54" y="71.3472">You can also use separators.</text><line style="stroke:#181818;stroke-width:1;" x1="12.8111" x2="335.5804" y1="74.649" y2="74.649"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="225.5039" x="61.4438" y="91.6441">Several separators are possible.</text><line style="stroke:#181818;stroke-width:1;" x1="8.1051" x2="340.2863" y1="98.9458" y2="98.9458"/><line style="stroke:#181818;stroke-width:1;" x1="8.2813" x2="340.1102" y1="100.9458" y2="100.9458"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="161.7451" x="93.3232" y="115.941">And you can add titles:</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="203.6426" x="69.3744" y="152.5347">This allows large description.</text><line style="stroke:#181818;stroke-width:1;stroke-dasharray:1,2;" x1="22.02" x2="136.0478" y1="131.3912" y2="131.3912"/><text fill="#000000" font-family="sans-serif" fon